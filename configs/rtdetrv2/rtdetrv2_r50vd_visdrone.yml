__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]

output_dir: ./output/rtdetrv2_r50vd_visdrone


num_classes: 12
remap_mscoco_category: False



lr_scheduler:
  type: MultiStepLR
  milestones: [50, 65]
  gamma: 0.1


eval_spatial_size: [960, 960]

# -----------------------------------------------------------------------
# Three-improvement combined configuration
#
# Fix A – LS Conv: applied only in CCFM fusion layers (not input projections)
#   → HybridEncoder.use_ls_conv: True
#
# Fix B – NWD Loss: weight set to 0.5 × GIoU weight (not equal to it)
#   Also: nwd_only_final=True so NWD only acts on the final decoder layer
#   → RTDETRCriterionv2.weight_dict.loss_nwd: 1  (= 0.5 × loss_giou=2)
#   → RTDETRCriterionv2.use_nwd_loss: True
#   → RTDETRCriterionv2.nwd_only_final: True
#
# Fix C – Dynamic Query Grouping: warm-up of 2000 iters before activation
#   and gradients are detached at reference-point grouping to isolate
#   grouping from NWD/GIoU optimisation.
#   → RTDETRTransformerv2.use_dynamic_grouping: True
#   → RTDETRTransformerv2.grouping_warmup_iters: 2000
# -----------------------------------------------------------------------

HybridEncoder:
  use_ls_conv: True   # Fix A: LS Conv only in CCFM, not in 1×1 projections

RTDETRTransformerv2:
  num_queries: 900
  use_dynamic_grouping: True    # Fix C: Dynamic Query Grouping enabled
  num_groups: 15                # 15 groups for 900 queries ≈ 60 queries/group
  grouping_warmup_iters: 2000   # Fix C: warm-up before grouping activates

RTDETRCriterionv2:
  use_nwd_loss: True    # Fix B: NWD Loss enabled
  nwd_only_final: True  # Fix B: NWD only at final layer (prevents gradient overload)
  weight_dict:
    loss_vfl: 1
    loss_bbox: 5
    loss_giou: 2
    loss_nwd: 1   # Fix B: 0.5 × loss_giou (= 0.5 × 2 = 1) balances gradient magnitudes

RTDETRPostProcessor:
  num_top_queries: 900

train_dataloader:
  total_batch_size: 4
  dataset:
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [960, 960]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}

  collate_fn:
    type: BatchImageCollateFuncion
    scales: [640, 672, 704, 736, 768, 800, 832, 864, 896, 928, 960, 992, 1024]
    stop_epoch: 71

val_dataloader:
  total_batch_size: 4
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [960, 960]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}